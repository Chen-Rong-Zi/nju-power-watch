name: Daily Electricity Query

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if data exists for today'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.11'

jobs:
  query-electricity:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Increased for 60k queries
    
    concurrency:
      group: daily-query
      cancel-in-progress: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create cookie file
        env:
          EPAY_COOKIE: ${{ secrets.EPAY_COOKIE }}
        run: |
          echo "$EPAY_COOKIE" > /tmp/cookie.json
      
      - name: Validate cookie
        id: validate
        run: |
          python scripts/validate_cookie.py /tmp/cookie.json
        continue-on-error: false
      
      - name: Read room IDs
        id: rooms
        run: |
          ROOM_IDS=$(cat config/room_ids.txt | grep -v '^#' | grep -v '^$' | tr '\n' ' ')
          echo "room_ids=$ROOM_IDS" >> $GITHUB_OUTPUT
          echo "Room IDs to query: $ROOM_IDS"
      
      - name: Query electricity data
        id: query
        env:
          QUERY_DATE: ${{ github.event.inputs.force_run == 'true' && '' || '--skip-existing' }}
        run: |
          START_TIME=$(date +%s)
          
          python nju_electric_query.py \
            -d ./database \
            -c 30 \
            ${{ steps.rooms.outputs.room_ids }} \
            2>&1 | tee query_output.log
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          # Extract success/failure counts
          SUCCESS=$(grep -oP '成功: \K\d+' query_output.log || echo "0")
          FAILED=$(grep -oP '失败: \K\d+' query_output.log || echo "0")
          TOTAL=$((SUCCESS + FAILED))
          
          # Calculate average time per query
          if [ "$TOTAL" -gt 0 ]; then
            AVG_TIME=$(echo "scale=2; $DURATION / $TOTAL" | bc)
            SUCCESS_RATE=$(echo "scale=2; $SUCCESS * 100 / $TOTAL" | bc)
          else
            AVG_TIME=0
            SUCCESS_RATE=0
          fi
          
          echo "success_count=$SUCCESS" >> $GITHUB_OUTPUT
          echo "failed_count=$FAILED" >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "avg_time=$AVG_TIME" >> $GITHUB_OUTPUT
          echo "success_rate=$SUCCESS_RATE" >> $GITHUB_OUTPUT
          
          echo ""
          echo "📊 Performance Metrics:"
          echo "  Total time: ${DURATION}s ($((DURATION / 60))m $((DURATION % 60))s)"
          echo "  Success rate: ${SUCCESS_RATE}%"
          echo "  Avg time/query: ${AVG_TIME}s"
          echo "  Concurrency: 30"
          
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::Query failed for $FAILED rooms"
            exit 1
          fi
      
      - name: Rollback on failure
        if: failure()
        run: |
          python scripts/rollback_failed_run.py -d ./database
          echo "::warning::Query failed - partial results rolled back"
      
      - name: Generate aggregated summary
        if: success()
        run: |
          python scripts/aggregate_data.py \
            --database ./database \
            --output ./database/summary.json
      
      - name: Commit and push results
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add new data files
          git add database/ || true
          
          # Check if there are changes
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "chore: update electricity data for $(date +%Y-%m-%d)"
            git push
          fi
      
      - name: Create log file
        if: always()
        run: |
          mkdir -p logs/query_runs
          LOG_FILE="logs/query_runs/$(date +%Y-%m-%d).log"
          
          {
            echo "$(date -Iseconds) INFO Starting daily query run"
            echo "$(date -Iseconds) INFO Room IDs: ${{ steps.rooms.outputs.room_ids }}"
            echo "$(date -Iseconds) INFO Success count: ${{ steps.query.outputs.success_count }}"
            echo "$(date -Iseconds) INFO Failed count: ${{ steps.query.outputs.failed_count }}"
            if [ "${{ job.status }}" == "failure" ]; then
              echo "$(date -Iseconds) ERROR Query failed"
            else
              echo "$(date -Iseconds) INFO Query completed successfully"
            fi
          } > "$LOG_FILE"
          
          git add "$LOG_FILE" || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: add query log for $(date +%Y-%m-%d)"
            git push
          fi
      
      - name: Summary
        if: always()
        run: |
          TOTAL=$(echo ${{ steps.rooms.outputs.room_ids }} | wc -w | tr -d ' ')
          SUCCESS=${{ steps.query.outputs.success_count }}
          FAILED=${{ steps.query.outputs.failed_count }}
          DURATION=${{ steps.query.outputs.duration }}
          AVG_TIME=${{ steps.query.outputs.avg_time }}
          SUCCESS_RATE=${{ steps.query.outputs.success_rate }}
          
          echo "## 📊 Daily Query Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Rooms | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Success | $SUCCESS |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "| 📈 Success Rate | ${SUCCESS_RATE}% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Performance" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ⏱️ Total Time | ${DURATION}s ($((DURATION / 60))m $((DURATION % 60))s) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Avg Time/Query | ${AVG_TIME}s |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔀 Concurrency | 30 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ job.status }}" == "success" ]; then
            echo "**Status**: ✅ All queries completed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status**: ⚠️ Some queries failed - check logs for details" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_💡 Tip: For 60k queries, estimated time is ~50 minutes at 30 concurrency_" >> $GITHUB_STEP_SUMMARY
