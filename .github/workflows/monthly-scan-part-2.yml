name: Monthly Scan Part 2 (50001-100000)

on:
  schedule:
    - cron: '0 3 8 * *'  # Every 8th of month at 3 AM UTC
  workflow_dispatch:
    inputs:
      start_id:
        description: 'Starting room ID'
        required: true
        default: '50001'
      end_id:
        description: 'Ending room ID'
        required: true
        default: '100000'

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  discover-rooms:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    concurrency:
      group: room-discovery
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Pull latest changes
        run: git pull --rebase origin ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Auto login to get cookie
        id: login
        uses: nick-fields/retry@v3
        env:
          NJU_USERNAME: ${{ secrets.NJU_USERNAME }}
          NJU_PASSWORD: ${{ secrets.NJU_PASSWORD }}
          YUNMA_TOKEN: ${{ secrets.YUNMA_TOKEN }}
        with:
          timeout_minutes: 3
          max_attempts: 3
          retry_wait_seconds: 3
          warning_on_retry: true
          command: |
            echo "$NJU_USERNAME" > /tmp/username
            echo "$NJU_PASSWORD" > /tmp/password
            echo "$YUNMA_TOKEN" > /tmp/token
            python scripts/nju_auto_login.py
            if [ ! -f "/tmp/cookie.json" ]; then
              echo "Cookie file not generated"
              exit 1
            fi

      - name: Scan for room IDs (50001-100000)
        id: scan
        run: |
          START_ID="${{ github.event.inputs.start_id || '50001' }}"
          END_ID="${{ github.event.inputs.end_id || '100000' }}"

          echo "扫描范围: $START_ID - $END_ID"

          python nju_electric_query.py \
            --cookie-file /tmp/cookie.json \
            --scan $START_ID $END_ID \
            --scan-output config/room_ids.json \
            -c 200

          COUNT=$(python3 -c "import json; m=json.load(open('config/room_ids.json')); print(sum(len(r) for b in m.values() for r in b.values()))" || echo "0")
          echo "found_count=$COUNT" >> $GITHUB_OUTPUT
          echo "发现 $COUNT 个有效房间ID"

      - name: Commit and push updated room_ids.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add config/room_ids.json

          STAGED_FILES=$(git diff --staged --name-only)
          if [ -z "$STAGED_FILES" ]; then
            echo "No changes to commit"
          else
            git commit -m "chore: update room_ids.json - scan part 2 (50001-100000) - ${{ steps.scan.outputs.found_count }} rooms"
            git push
            echo "✓ room_ids.json 已更新"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 🔍 Room Discovery Part 2 (50001-100000)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Range | 50001-100000 |" >> $GITHUB_STEP_SUMMARY
          echo "| Found Rooms | ${{ steps.scan.outputs.found_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
