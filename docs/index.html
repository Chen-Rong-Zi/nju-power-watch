<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NJU Electricity Data Viewer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>NJU Electricity Data Viewer</h1>
            <p class="subtitle">南京大学电费数据查询系统</p>
            <p class="update-notice">📊 支持完整历史数据 | 智能预测分析</p>
        </header>

        <main>
            <!-- T043: User Configuration Controls -->
            <section class="config-section" id="consumption-config" style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none;">
                <h3 style="margin-bottom: 10px; font-size: 0.95rem;">⚙️ 消耗分析配置</h3>
                <div style="display: flex; flex-wrap: wrap; gap: 15px;">
                    <div class="control-group">
                        <label for="config-prediction-window">预测窗口 (天):</label>
                        <input type="number" id="config-prediction-window" min="7" max="30" value="14" style="width: 80px;">
                    </div>
                    <div class="control-group">
                        <label for="config-anomaly-threshold">异常阈值 (σ):</label>
                        <input type="number" id="config-anomaly-threshold" min="1.5" max="3" step="0.1" value="2.0" style="width: 80px;">
                    </div>
                    <div class="control-group">
                        <label for="config-confidence-threshold">置信度阈值:</label>
                        <input type="number" id="config-confidence-threshold" min="0.5" max="0.9" step="0.05" value="0.70" style="width: 80px;">
                    </div>
                    <button class="btn" id="btn-save-config" style="align-self: flex-end;">保存配置</button>
                </div>
            </section>

            <!-- Navigation Menu -->
            <nav class="nav-menu">
                <a href="#/" class="active" data-page="home">首页</a>
                <a href="#/consumption" data-page="consumption">⚡ 消耗视角</a>
                <a href="#/comparison" data-page="comparison">📈 对比分析</a>
                <a href="#/dashboard" data-page="dashboard">🏢 仪表盘</a>
            </nav>

            <!-- Search Section -->
            <section class="search-section">
                <h2>查找房间</h2>
                
                <div class="search-controls">
                    <div class="control-group">
                        <label for="campus-select">校区 Campus:</label>
                        <select id="campus-select">
                            <option value="">-- 请选择校区 --</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="building-select">楼栋 Building:</label>
                        <select id="building-select" disabled>
                            <option value="">-- 请先选择校区 --</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="room-select">房间 Room:</label>
                        <select id="room-select" disabled>
                            <option value="">-- 请先选择楼栋 --</option>
                        </select>
                        <input type="text" id="room-search" placeholder="搜索房间..." disabled>
                    </div>
                </div>

                <div class="room-info" id="room-info" style="display: none;">
                    <h3>房间信息</h3>
                    <p><strong>校区:</strong> <span id="info-campus"></span></p>
                    <p><strong>楼栋:</strong> <span id="info-building"></span></p>
                    <p><strong>房间:</strong> <span id="info-room"></span></p>
                    <p><strong>记录数:</strong> <span id="info-records"></span></p>
                </div>
            </section>

            <!-- Chart Section -->
            <section class="chart-section" id="chart-section" style="display: none;">
                <h2>电费变化趋势</h2>

                <div class="chart-container">
                    <canvas id="electricity-chart"></canvas>
                </div>

                <div class="chart-controls">
                    <button id="btn-7d" class="btn active">最近7天</button>
                    <button id="btn-30d" class="btn">最近30天</button>
                    <button id="btn-all" class="btn">全部数据</button>
                </div>

                <div class="statistics">
                    <div class="stat-card">
                        <div class="stat-label">当前余额</div>
                        <div class="stat-value" id="stat-current">--</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">日均消耗</div>
                        <div class="stat-value" id="stat-avg">--</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">最低余额</div>
                        <div class="stat-value" id="stat-min">--</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">最高余额</div>
                        <div class="stat-value" id="stat-max">--</div>
                    </div>
                </div>
            </section>

            <!-- Consumption Analogy Section (displays on main page when room is selected) -->
            <section class="consumption-analogy-section" id="consumption-analogy-container" style="display: none;">
                <!-- Content dynamically generated by displayConsumptionAnalogy() -->
            </section>

            <!-- Loading & Error -->
            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>加载中...</p>
            </div>

            <div class="error" id="error" style="display: none;">
                <p class="error-message" id="error-message"></p>
            </div>
        </main>

        <footer>
            <p>数据来源: NJU epay系统 | 自动更新: 每日 2:00 AM UTC</p>
            <p><a href="https://github.com">GitHub Repository</a></p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="js/vendor/echarts.min.js"></script>
    <script src="js/utils/analytics.js"></script>
    <script src="js/utils/prediction.js"></script>
    <script src="js/utils/notifications.js"></script>
    <script src="js/app.js"></script>
    <script src="js/modules/warnings.js"></script>
    <script src="js/modules/heatmap.js"></script>
    <script src="js/modules/comparison.js"></script>
    <script src="js/modules/recharge.js"></script>
    <script src="js/modules/patterns.js"></script>
    <script src="js/modules/dashboard.js"></script>
    <script src="js/modules/cost-prediction.js"></script>
    <script src="js/modules/alerts.js"></script>
    <script src="js/modules/achievements.js"></script>
    <!-- Consumption Perspective Modules -->
    <script type="module" src="js/modules/utils.js"></script>
    <script type="module" src="js/modules/consumption-calculator.js"></script>
    <script type="module" src="js/modules/consumption.js"></script>
    <script type="module" src="js/modules/user-config.js"></script>
    <script type="module" src="js/modules/consumption-analogy.js"></script>
    <script type="module" src="js/modules/animated-loader.js"></script>
    <script type="module" src="js/modules/campus-view.js"></script>
    <script type="module" src="js/modules/building-view.js"></script>
    <script type="module" src="js/modules/room-view.js"></script>
    <script type="module" src="js/modules/prediction.js"></script>
</body>
</html>
